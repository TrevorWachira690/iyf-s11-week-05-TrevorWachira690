<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Day 4: Content Copier</title>
    <style>
        body { font-family: system-ui, sans-serif; max-width: 700px; margin: 40px auto; line-height: 1.6; color: #222; }
        section { padding: 20px; border: 1px solid #ddd; border-radius: 8px; }
        button { padding: 8px 14px; cursor: pointer; }
        #source, #target { min-height: 60px; padding: 10px; border: 1px dashed #999; margin-bottom: 8px; }
    </style>
</head>
<body>
    <section>
        <h2>Day 4: Content Copier</h2>
        <p>Bonus version: also supports drag and drop, not just the button.</p>

        <p>Source (drag this box, or click "Copy"):</p>
        <div id="source" draggable="true">Drag me, or click "Copy" below.</div>

        <button id="copy-btn">Copy to Target</button>

        <p>Target:</p>
        <div id="target"></div>
    </section>

    <script src="ContentCopier.js"></script>
</body>
</html>
