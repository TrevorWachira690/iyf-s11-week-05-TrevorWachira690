<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Day 2: Dynamic Element Creator</title>
    <style>
        body { font-family: system-ui, sans-serif; max-width: 700px; margin: 40px auto; line-height: 1.6; color: #222; }
        section { padding: 20px; border: 1px solid #ddd; border-radius: 8px; }
        button { padding: 8px 14px; cursor: pointer; }
        #paragraph-list p { display: flex; justify-content: space-between; align-items: center; padding: 6px; background: #f5f5f5; margin: 4px 0; border-radius: 4px; }
        #paragraph-list button { margin-left: 12px; }
    </style>
</head>
<body>
    <section>
        <h2>Day 2: Dynamic Element Creator</h2>
        <p>Each click adds a new numbered paragraph, with its own delete button.</p>
        <button id="add-paragraph-btn">Add Paragraph</button>
        <div id="paragraph-list"></div>
    </section>

    <script src="Day_2.js"></script>
</body>
</html>
