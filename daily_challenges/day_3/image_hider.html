<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Day 3: Image Remover</title>
    <style>
        body { font-family: system-ui, sans-serif; max-width: 700px; margin: 40px auto; line-height: 1.6; color: #222; }
        section { padding: 20px; border: 1px solid #ddd; border-radius: 8px; }
        button { padding: 8px 14px; cursor: pointer; }
        #image-list { margin-top: 12px; display: flex; gap: 10px; }
    </style>
</head>
<body>
    <section>
        <h2>Day 3: Image Remover</h2>
        <p>Bonus version: toggles between hide and show, instead of permanently deleting.</p>
        <button id="toggle-images-btn">Hide Images</button>
        <div id="image-list">
            <img src="https://placehold.co/80" alt="placeholder 1" width="80">
            <img src="https://placehold.co/80" alt="placeholder 2" width="80">
            <img src="https://placehold.co/80" alt="placeholder 3" width="80">
        </div>
    </section>

    <script src="image_hider.js"></script>
</body>
</html>
